AWSTemplateFormatVersion: '2010-09-09'
Description: >
  PayAlert — Auto Scaling Group for the audit portal.
  Deploy this stack AFTER the network stack is up AND after building
  payalert-portal-ami from the configured payalert-audit-ec2 instance.

# ── Parameters ────────────────────────────────────────────────────────────────

Parameters:

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Must match the Environment value used in the network stack

  AmiId:
    Type: AWS::EC2::Image::Id
    Description: >
      AMI ID of payalert-portal-ami — created from the configured
      payalert-audit-ec2 instance (DEPLOYMENT.md Step 9.1).

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: payalert-key
    Description: EC2 key pair name (same as network stack)

  InstanceProfileName:
    Type: String
    Default: LabInstanceProfile
    Description: >
      Name of the IAM instance profile to attach to ASG instances.
      In AWS Academy Learner Labs this is typically 'LabInstanceProfile'.

# ── Resources ─────────────────────────────────────────────────────────────────

Resources:

  # ── Launch Template ───────────────────────────────────────────────────────────

  PortalLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: payalert-portal-lt
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: t3.large
        KeyName: !Ref KeyPairName
        SecurityGroupIds:
          - Fn::ImportValue: !Sub payalert-ec2-sg-id-${Environment}
        IamInstanceProfile:
          Name: !Ref InstanceProfileName
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 1
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: 20
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: payalert-portal-asg-instance
              - Key: Project
                Value: PayAlert
              - Key: Group
                Value: payalert-group-4
              - Key: Environment
                Value: !Ref Environment

  # ── Auto Scaling Group ────────────────────────────────────────────────────────

  PortalASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: payalert-portal-asg
      LaunchTemplate:
        LaunchTemplateId: !Ref PortalLaunchTemplate
        Version: !GetAtt PortalLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub payalert-private-subnet-1-${Environment}
        - Fn::ImportValue: !Sub payalert-private-subnet-2-${Environment}
      TargetGroupARNs:
        - Fn::ImportValue: !Sub payalert-audit-tg-arn-${Environment}
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Project
          Value: PayAlert
          PropagateAtLaunch: true
        - Key: Group
          Value: payalert-group-4
          PropagateAtLaunch: true
        - Key: Environment
          Value: !Ref Environment
          PropagateAtLaunch: true

  # ── Scaling Policy: CPU Target Tracking ───────────────────────────────────────

  CPUTargetTrackingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref PortalASG
      PolicyName: payalert-cpu-target-tracking
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 60.0

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:

  ASGName:
    Description: Auto Scaling Group name for the audit portal
    Value: !Ref PortalASG

  LaunchTemplateId:
    Description: Launch Template ID — update this when you create a new AMI
    Value: !Ref PortalLaunchTemplate
