AWSTemplateFormatVersion: '2010-09-09'
Description: >
  PayAlert - Network infrastructure: VPC, subnets, gateways, route tables,
  security groups, EC2 instances, ALB, and target groups.

# ── Parameters ────────────────────────────────────────────────────────────────

Parameters:

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment tag

  WorkstationCidr:
    Type: String
    Description: >
      Your workstation's public IP in CIDR notation (e.g. 203.0.113.5/32).
      Used to restrict port 5001 on the ALB to your machine only.
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: Must be a valid CIDR block (e.g. 203.0.113.5/32)

  UbuntuAmiId:
    Type: AWS::EC2::Image::Id
    Description: >
      AMI ID for Ubuntu Server 26.04 LTS (64-bit x86) in us-east-1.
      Find it in EC2 Console → AMIs → Public images → search "ubuntu-26.04".

  InstanceProfileName:
    Type: String
    Default: LabInstanceProfile
    Description: >
      Name of the IAM instance profile to attach to EC2 instances.
      In AWS Academy Learner Labs this is typically 'LabInstanceProfile'.

  CertificateArn:
    Type: String
    Default: ''
    Description: >
      ACM certificate ARN for HTTPS on port 443. Leave empty for HTTP-only (lab default).
      When set, port 80 redirects to 443 and the audit portal is served over HTTPS.

  GithubUsername:
    Type: String
    Description: >
      GitHub username or organisation that owns the PayAlert repository.
      Used to clone: https://github.com/<GithubUsername>/PayAlert.git

  UiUsername:
    Type: String
    Default: payalert
    Description: Username for the transaction generator web UI login.

  UiPassword:
    Type: String
    NoEcho: true
    Description: Password for the transaction generator web UI login.

  PortalUsername:
    Type: String
    Default: admin
    Description: Username for the audit portal login.

  PortalPassword:
    Type: String
    NoEcho: true
    Description: Password for the audit portal login.

  PortalDomain:
    Type: String
    Default: ''
    Description: >
      Custom domain hostname for the audit portal (e.g. payalert-portal.adamchok.xyz).
      When set, an explicit host-based routing rule on port 80 forwards this hostname to
      the audit target group. The default action already covers this — this parameter is
      optional but makes routing intent explicit.

  ProducerDomain:
    Type: String
    Default: ''
    Description: >
      Custom domain hostname for the generator UI (e.g. payalert-producer.adamchok.xyz).
      When set, a host-based routing rule on port 80 forwards this hostname to the generator
      target group — allowing Cloudflare proxy to serve the generator UI without port 5001.
      Leave empty to access the generator UI only via port 5001.

# ── Conditions ────────────────────────────────────────────────────────────────

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]
  HasPortalDomain: !Not [!Equals [!Ref PortalDomain, '']]
  HasProducerDomain: !Not [!Equals [!Ref ProducerDomain, '']]

# ── Resources ─────────────────────────────────────────────────────────────────

Resources:

  # ── VPC ──────────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: payalert-vpc
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  # ── Subnets ───────────────────────────────────────────────────────────────────

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: payalert-public-1
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: payalert-public-2
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: payalert-private-1
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: payalert-private-2
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  # ── Internet Gateway ──────────────────────────────────────────────────────────

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: payalert-igw
        - Key: Project
          Value: Capstone

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ── NAT Gateway ───────────────────────────────────────────────────────────────
  # Single NAT Gateway in AZ-a (cost-optimised for lab). For production add a
  # second EIP + NatGateway in PublicSubnet2 and route PrivateSubnet2 through it
  # to eliminate cross-AZ charges and achieve AZ-level HA.

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: payalert-eip
        - Key: Project
          Value: Capstone

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: payalert-nat-gw
        - Key: Project
          Value: Capstone

  # ── Route Tables ──────────────────────────────────────────────────────────────

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: payalert-public-rt
        - Key: Project
          Value: Capstone

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: payalert-private-rt
        - Key: Project
          Value: Capstone

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── Security Groups ───────────────────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: PayAlertALBSG
      GroupDescription: ALB - port 80 public, port 443 when HTTPS enabled, port 5001 workstation only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP - redirects to HTTPS when CertificateArn is set
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS audit portal - active when CertificateArn is set
        - IpProtocol: tcp
          FromPort: 5001
          ToPort: 5001
          CidrIp: !Ref WorkstationCidr
          Description: Generator UI - workstation only
      Tags:
        - Key: Name
          Value: CapstoneALBSG
        - Key: Project
          Value: Capstone

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: PayAlertEC2SG
      GroupDescription: EC2 instances - app ports via ALB only; SSH via SSM (no direct inbound)
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Audit portal - ALB only
        - IpProtocol: tcp
          FromPort: 5001
          ToPort: 5001
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Generator UI - ALB only
      Tags:
        - Key: Name
          Value: CapstoneEC2SG
        - Key: Project
          Value: Capstone

  # ── EC2: Transaction Generator + Web UI ───────────────────────────────────────

  GeneratorInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - PrivateRoute
      - PrivateSubnet1Association
    Properties:
      ImageId: !Ref UbuntuAmiId
      InstanceType: t3.micro
      SubnetId: !Ref PrivateSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref InstanceProfileName
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            exec >> /var/log/payalert-setup.log 2>&1
            curl -fsSL https://raw.githubusercontent.com/${GithubUsername}/PayAlert/master/scripts/setup-generator-ec2.sh -o /tmp/setup-generator.sh
            ACCOUNT_ID=${AWS::AccountId} \
            ENVIRONMENT=${Environment} \
            UI_USERNAME=${UiUsername} \
            UI_PASSWORD=${UiPassword} \
            GITHUB_USERNAME=${GithubUsername} \
            bash /tmp/setup-generator.sh && echo "USERDATA_SUCCESS" >> /var/log/payalert-setup.log || echo "USERDATA_FAILED" >> /var/log/payalert-setup.log
      Tags:
        - Key: Name
          Value: payalert-producer-ec2
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  # ── EC2: Audit Portal ─────────────────────────────────────────────────────────

  AuditInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - PrivateRoute
      - PrivateSubnet2Association
    Properties:
      ImageId: !Ref UbuntuAmiId
      InstanceType: t3.large
      SubnetId: !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref InstanceProfileName
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            exec >> /var/log/payalert-setup.log 2>&1
            curl -fsSL https://raw.githubusercontent.com/${GithubUsername}/PayAlert/master/scripts/setup-audit-portal-ec2.sh -o /tmp/setup-portal.sh
            ACCOUNT_ID=${AWS::AccountId} \
            ENVIRONMENT=${Environment} \
            PORTAL_USERNAME=${PortalUsername} \
            PORTAL_PASSWORD=${PortalPassword} \
            GITHUB_USERNAME=${GithubUsername} \
            bash /tmp/setup-portal.sh && echo "USERDATA_SUCCESS" >> /var/log/payalert-setup.log || echo "USERDATA_FAILED" >> /var/log/payalert-setup.log
      Tags:
        - Key: Name
          Value: payalert-portal-ec2
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  # ── Application Load Balancer ─────────────────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: payalert-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        - Key: access_logs.s3.enabled
          Value: 'false'
      Tags:
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  # ── Target Groups ─────────────────────────────────────────────────────────────
  # AuditTargetGroup has no static Targets — the ASG manages instance registration.
  # AuditInstance (from this stack) is intentionally excluded to prevent dual-serving
  # alongside ASG instances when the asg-stack is deployed.

  AuditTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: payalert-audit-tg
      Protocol: HTTP
      Port: 3000
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /api/health
      Matcher:
        HttpCode: '200'
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      Tags:
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  GeneratorTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: payalert-generator-tg
      Protocol: HTTP
      Port: 5001
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      Tags:
        - Key: Project
          Value: Capstone
        - Key: Group
          Value: '4'
        - Key: Scenario
          Value: PayAlert
        - Key: Environment
          Value: !Ref Environment

  # ── ALB Listeners ─────────────────────────────────────────────────────────────

  # When CertificateArn is set: this listener serves HTTPS on 443.
  # When CertificateArn is empty: this listener serves HTTP on 80 (lab default).
  AuditListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: !If [HasCertificate, HTTPS, HTTP]
      Port: !If [HasCertificate, 443, 80]
      Certificates: !If
        - HasCertificate
        - - CertificateArn: !Ref CertificateArn
        - !Ref AWS::NoValue
      SslPolicy: !If [HasCertificate, ELBSecurityPolicy-TLS13-1-2-2021-06, !Ref AWS::NoValue]
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AuditTargetGroup

  # HTTP→HTTPS redirect — only created when CertificateArn is set.
  HttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  GeneratorListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTP
      Port: 5001
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GeneratorTargetGroup

  PortalListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasPortalDomain
    Properties:
      ListenerArn: !Ref AuditListener
      Priority: 20
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Ref PortalDomain
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AuditTargetGroup

  # Routes a custom producer hostname on port 80 to the generator target group.
  # Enables Cloudflare proxy (which blocks port 5001) to front the generator UI.
  ProducerListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasProducerDomain
    Properties:
      ListenerArn: !Ref AuditListener
      Priority: 10
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Ref ProducerDomain
      Actions:
        - Type: forward
          TargetGroupArn: !Ref GeneratorTargetGroup

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:

  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub payalert-vpc-id-${Environment}

  PrivateSubnet1Id:
    Description: Private subnet 1 (us-east-1a) — generator EC2
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub payalert-private-subnet-1-${Environment}

  PrivateSubnet2Id:
    Description: Private subnet 2 (us-east-1b) — portal EC2 + ASG
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub payalert-private-subnet-2-${Environment}

  EC2SecurityGroupId:
    Description: EC2 security group ID — used by the ASG launch template
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub payalert-ec2-sg-id-${Environment}

  AuditTargetGroupArn:
    Description: Audit portal target group ARN — used by the portal ASG
    Value: !Ref AuditTargetGroup
    Export:
      Name: !Sub payalert-audit-tg-arn-${Environment}

  GeneratorTargetGroupArn:
    Description: Generator target group ARN — used by the producer ASG
    Value: !Ref GeneratorTargetGroup
    Export:
      Name: !Sub payalert-generator-tg-arn-${Environment}

  ProducerInstanceId:
    Description: Instance ID for payalert-producer-ec2 — use with SSM Session Manager
    Value: !Ref GeneratorInstance

  PortalInstanceId:
    Description: Instance ID for payalert-portal-ec2 — use with SSM Session Manager
    Value: !Ref AuditInstance

  AlbDnsName:
    Description: ALB DNS name — base URL for both applications
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub payalert-alb-dns-${Environment}

  AlbFullName:
    Description: ALB LoadBalancerFullName — used by the portal ASG request-count scaling ResourceLabel
    Value: !GetAtt ALB.LoadBalancerFullName
    Export:
      Name: !Sub payalert-alb-full-name-${Environment}

  AuditTargetGroupFullName:
    Description: Audit portal TargetGroupFullName — used by the portal ASG request-count scaling ResourceLabel
    Value: !GetAtt AuditTargetGroup.TargetGroupFullName
    Export:
      Name: !Sub payalert-audit-tg-full-name-${Environment}
